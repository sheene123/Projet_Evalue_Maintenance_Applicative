name: Tests Python

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Vérifier le style (flake8)
        shell: bash
        run: |
          set -o pipefail
          echo "::group::flake8"
          flake8 . --max-line-length=100 2>&1 | tee flake8.log
          echo "::endgroup::"

      - name: Vérifier le format (black)
        shell: bash
        run: |
          set -o pipefail
          echo "::group::black"
          black --check --diff . 2>&1 | tee black.log
          echo "::endgroup::"

      - name: Lancer les tests (pytest)
        shell: bash
        run: |
          set -o pipefail
          echo "::group::pytest"
          pytest -v --tb=long 2>&1 | tee pytest.log
          echo "::endgroup::"

      - name: Sauvegarder les logs (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-ci
          path: |
            flake8.log
            black.log
            pytest.log
          if-no-files-found: warn
